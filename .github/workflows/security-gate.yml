name: Security Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block committed env files
        shell: bash
        run: |
          set -euo pipefail

          # Bloquea .env reales pero NO .env.example / .env.sample / .env.template
          if git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.local$|(^|/)\.env\.[^.]+\.local$|(^|/)\.env\.(production|development|staging|test)$'; then
            echo "::error::.env files must not be tracked. Use .env.example with placeholders."
            exit 1
          fi

      - name: Scan high-risk changed files
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          # Guard: primer push o SHA vacio/cero -> compara contra el commit anterior
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files to scan."
            exit 0
          fi

          PATTERN='postgres(ql)?://[^[:space:]"'"'"']+|napi_[A-Za-z0-9]{20,}|npg_[A-Za-z0-9]{8,}|-----BEGIN (RSA|OPENSSH|EC|PRIVATE) KEY-----|FIREBASE_PRIVATE_KEY|PRIVATE_KEY='

          # FIX: here-string en vez de pipe, asi el loop corre en el shell principal
          # y el fallo se propaga de verdad. Ademas reporta TODOS los archivos, no solo el primero.
          found=0
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            case "$file" in
              .github/workflows/security-gate.yml|*package-lock.json|*.png|*.jpg|*.jpeg|*.webp|*.gif|*.svg)
                continue
                ;;
            esac
            if grep -nE "$PATTERN" "$file"; then
              echo "::error::Potential secret detected in $file"
              found=1
            fi
          done <<< "$CHANGED_FILES"

          if [ "$found" -eq 1 ]; then
            exit 1
          fi