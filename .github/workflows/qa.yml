name: QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs viejos del mismo PR/branch (no quema minutos en empujes seguidos)
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

# Menos privilegio posible: QA solo necesita leer el repo
permissions:
  contents: read

jobs:
  qa:
    name: qa
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm --workspace apps/web run build

      - name: Build admin app
        run: npm --workspace apps/admin run build

      - name: Build Firebase functions
        run: npm --workspace apps/functions run build