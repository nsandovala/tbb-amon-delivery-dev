version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:10"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"

  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:20"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "admin"

  - package-ecosystem: "npm"
    directory: "/apps/functions"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "functions"

  - package-ecosystem: "npm"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:40"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "shared"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santiago"
    labels:
      - "dependencies"
      - "github-actions"