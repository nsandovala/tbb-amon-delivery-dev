
# .github/dependabot.yml
#
# NOTA OPERATIVA:
# - Los "major" de framework (next, tailwindcss, typescript, firebase*, @types/node, lucide-react)
#   están IGNORADOS a propósito durante la marcha blanca del piloto.
# - No desaparecen para siempre: cuando estabilices el piloto, abre un "sprint de upgrade"
#   y quita temporalmente los ignore correspondientes para subirlos de forma deliberada y testeada.
# - No se define `labels:` a propósito: así Dependabot aplica/crea su label por defecto
#   ("dependencies") sin riesgo de error por label inexistente.
 
# .github/dependabot.yml
# SOLO version + updates. El auto-merge va en .github/workflows/dependabot-auto-merge.yml
#
# NOTA: los major de framework (next, tailwindcss, typescript, firebase*, @types/node,
# lucide-react, dotenv) estan IGNORADOS durante la marcha blanca. Cuando estabilices,
# abre un sprint de upgrade y quita temporalmente los ignore correspondientes.

version: 2

updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 2
    groups:
      npm-root-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-functions"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]

  # Web app
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:10"
      timezone: "America/Santiago"
    open-pull-requests-limit: 2
    groups:
      web-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  # Admin app
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:20"
      timezone: "America/Santiago"
    open-pull-requests-limit: 2
    groups:
      admin-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  # Firebase Functions (camino critico backend-first)
  - package-ecosystem: "npm"
    directory: "/apps/functions"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/Santiago"
    open-pull-requests-limit: 1
    groups:
      functions-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "firebase-functions"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Shared package
  - package-ecosystem: "npm"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:40"
      timezone: "America/Santiago"
    open-pull-requests-limit: 1
    groups:
      shared-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 1
    groups:
      github-actions-safe-updates:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]