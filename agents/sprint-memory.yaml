sprint: backend-1
goal: >
  Move AMON Delivery to backend-first writes without breaking current storefront, POS, and orders panel.

source_of_truth:
  firestore_project: minierp-sentinel
  firestore_root: tenants/{tenantId}
  pilot_tenant: tbb

rules:
  - no new firebase project
  - backend-first
  - no mock flows where real data exists
  - sqlite bot remains fallback until bridge is stable

current_status:
  storefront: working
  pos: working
  orders_panel: working
  daily_metrics: working
  bot_sqlite: working
  bot_firestore_bridge: pending
  backend_api: pending

next_actions:
  - create backend skeleton
  - implement POST /api/orders
  - implement PATCH /api/orders/:id/status
  - implement POST /api/pos/sale
  - prepare bot bridge contract

